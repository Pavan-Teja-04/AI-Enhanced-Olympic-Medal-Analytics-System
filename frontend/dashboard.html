<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Olympic Medal Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/app.css">
</head>
<body data-page="dashboard">
    <header class="topbar">
        <a class="brand" href="index.html"><span class="rings"><span></span><span></span><span></span></span>Olympic Medal Analytics</a>
        <nav class="nav">
            <a href="index.html">Home</a><a href="dashboard.html">Dashboard</a><a href="standings.html">Standings</a><a href="analytics.html">Analytics</a><a href="prediction.html">Prediction</a><a href="ai-insights.html">AI Insights</a><button class="btn" data-theme-toggle>Theme</button>
        </nav>
    </header>
    <main class="page">
        <section class="section-head"><div><h1>Analytics Dashboard</h1><p class="muted">Top countries, sport distribution, and historical medal trends.</p></div><button class="btn primary" onclick="window.print()">Export PDF</button></section>
        <p id="pageStatus" class="hidden"></p>
        <section class="grid stats">
            <article class="card"><h3>Total Medals</h3><div id="totalMedals" class="stat-value">0</div></article>
            <article class="card"><h3>Countries</h3><div id="totalCountries" class="stat-value">0</div></article>
            <article class="card"><h3>Sports</h3><div id="totalSports" class="stat-value">0</div></article>
            <article class="card"><h3>First Year</h3><div id="firstYear" class="stat-value">0</div></article>
            <article class="card"><h3>Latest Year</h3><div id="latestYear" class="stat-value">0</div></article>
        </section>
        <section class="grid two" style="margin-top: 18px;"><article class="panel"><h2>Top Countries</h2><canvas id="countryChart"></canvas></article><article class="panel"><h2>Sport Statistics</h2><canvas id="sportChart"></canvas></article></section>
        <section class="panel" style="margin-top: 18px;"><h2>Year-wise Medal Trend</h2><canvas id="trendChart"></canvas></section>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
