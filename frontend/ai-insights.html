<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Insights - Olympic Medal Analytics</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <header class="topbar"><a class="brand" href="index.html"><span class="rings"><span></span><span></span><span></span></span>Olympic Medal Analytics</a><nav class="nav"><a href="index.html">Home</a><a href="dashboard.html">Dashboard</a><a href="standings.html">Standings</a><a href="analytics.html">Analytics</a><a href="prediction.html">Prediction</a><a href="ai-insights.html">AI Insights</a><button class="btn" data-theme-toggle>Theme</button></nav></header>
    <main class="page">
        <section class="section-head"><div><h1>AI Generated Insights</h1><p class="muted">Country summaries, trend analysis, and historical comparison reports.</p></div><button class="btn primary" onclick="window.print()">Export Report</button></section>
        <section class="grid two">
            <form id="aiForm" class="panel grid">
                <label>Country<input name="country" placeholder="United States" required></label>
                <button class="btn primary" type="submit">Generate Summary</button>
                <p id="aiMessage" class="hidden"></p>
            </form>
            <section class="panel">
                <h2>Generated Report</h2>
                <p id="aiInsight" class="insight-box muted">Generate an AI insight card for a selected country.</p>
            </section>
        </section>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
